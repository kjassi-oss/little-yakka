# Codemagic CI — cloud iOS build for Little Yakka (built on Windows, no Mac).
# Manual code signing with a distribution certificate + App Store provisioning profile
# we created ourselves in the Apple portal (the profile includes Push Notifications).
# Provided as base64 env vars in the Codemagic variable group "ios_signing":
#   CERT_P12_B64   – base64 of the distribution .p12
#   CERT_PASSWORD  – the .p12 password
#   PROFILE_B64    – base64 of the App Store .mobileprovision
# TestFlight upload uses the App Store Connect API key integration "LittleYakka_ASC".
workflows:
  ios-testflight:
    name: Little Yakka iOS — TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: LittleYakka_ASC
    environment:
      groups:
        - ios_signing
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: 22.17.0
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Sync Capacitor iOS (copies web assets, resolves SPM plugins)
        script: npx cap sync ios
      - name: Set build number (unique per TestFlight upload)
        script: /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" ios/App/App/Info.plist
      - name: Set up manual code signing
        script: |
          keychain initialize
          echo "$CERT_P12_B64" | base64 --decode > /tmp/dist.p12
          keychain add-certificates --certificate /tmp/dist.p12 --certificate-password "$CERT_PASSWORD"
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          echo "$PROFILE_B64" | base64 --decode > "$PROFILES_HOME/littleyakka_appstore.mobileprovision"
          xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa --project "$XCODE_PROJECT" --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # Upload to App Store Connect only. The build then appears in TestFlight for
        # internal testers automatically; we don't auto-submit to external beta (that
        # needs Apple beta review and was causing the red post-processing step).
        submit_to_testflight: false

  # Android AAB for Google Play. Signing uses our own upload keystore, provided
  # as base64 env vars in the Codemagic variable group "android_signing":
  #   KEYSTORE_B64      – base64 of the upload keystore (.jks)
  #   KEYSTORE_PASSWORD – keystore password
  #   KEY_ALIAS         – key alias (upload)
  #   KEY_PASSWORD      – key password
  # First Play upload is manual (download the .aab artifact and upload it in the
  # Play Console); Play App Signing re-signs with Google's app signing key.
  android-play:
    name: Little Yakka Android — Play AAB
    max_build_duration: 45
    instance_type: linux_x2
    environment:
      groups:
        - android_signing
      vars:
        JAVA_TOOL_OPTIONS: "-Xmx4g"
      node: 22.17.0
      java: 17
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Sync Capacitor Android
        script: npx cap sync android
      - name: Decode upload keystore
        script: |
          echo "$KEYSTORE_B64" | base64 --decode > /tmp/upload.jks
          echo "KEYSTORE_PATH=/tmp/upload.jks" >> $CM_ENV
      - name: Build signed AAB
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
