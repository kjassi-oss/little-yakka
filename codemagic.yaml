# Codemagic CI — cloud iOS build for Little Yakka (built on Windows, no Mac).
# Produces a signed .ipa and uploads it to TestFlight.
#
# Uses Xcode-managed AUTOMATIC signing (-allowProvisioningUpdates) with the App Store
# Connect API key, so the generated provisioning profile always includes the app's
# capabilities (e.g. Push Notifications). The codemagic-cli manual-profile path could
# not produce a profile with Push, which broke the archive.
#
# Prereqs (one-time, in the Codemagic UI / Apple portals):
#  - App Store Connect API key added to Codemagic, named exactly: LittleYakka_ASC
#  - App record exists in App Store Connect with bundle id com.littleyakka.app
#  - Push Notifications enabled on the com.littleyakka.app App ID
workflows:
  ios-testflight:
    name: Little Yakka iOS — TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: LittleYakka_ASC
    environment:
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        TEAM_ID: "9D5QNNA5ZT"
      node: 22.17.0
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Sync Capacitor iOS (copies web assets, resolves SPM plugins)
        script: npx cap sync ios
      - name: Set build number (unique per TestFlight upload)
        script: /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" ios/App/App/Info.plist
      - name: Put distribution certificate in the keychain
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.littleyakka.app" --type IOS_APP_STORE --create
          keychain add-certificates
      - name: Archive (Xcode-managed automatic signing)
        script: |
          # Codemagic exposes the API key as "@file:<path>" — strip the prefix to get the path.
          KEY_PATH="${APP_STORE_CONNECT_PRIVATE_KEY#@file:}"
          xcodebuild -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "build/App.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            archive
      - name: Export IPA
        script: |
          KEY_PATH="${APP_STORE_CONNECT_PRIVATE_KEY#@file:}"
          xcodebuild -exportArchive \
            -archivePath "build/App.xcarchive" \
            -exportPath "build/ipa" \
            -exportOptionsPlist "ios/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"
    artifacts:
      - build/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
