# Codemagic CI — cloud iOS build for Little Yakka (built on Windows, no Mac).
# Manual code signing with a distribution certificate + App Store provisioning profile
# we created ourselves in the Apple portal (the profile includes Push Notifications).
# Provided as base64 env vars in the Codemagic variable group "ios_signing":
#   CERT_P12_B64   – base64 of the distribution .p12
#   CERT_PASSWORD  – the .p12 password
#   PROFILE_B64    – base64 of the App Store .mobileprovision
# TestFlight upload uses the App Store Connect API key integration "LittleYakka_ASC".
workflows:
  ios-testflight:
    name: Little Yakka iOS — TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: LittleYakka_ASC
    environment:
      groups:
        - ios_signing
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: 22.17.0
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Sync Capacitor iOS (copies web assets, resolves SPM plugins)
        script: npx cap sync ios
      - name: Set build number (unique per TestFlight upload)
        script: /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" ios/App/App/Info.plist
      - name: Set up manual code signing
        script: |
          keychain initialize
          echo "$CERT_P12_B64" | base64 --decode > /tmp/dist.p12
          keychain add-certificates --certificate /tmp/dist.p12 --certificate-password "$CERT_PASSWORD"
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          echo "$PROFILE_B64" | base64 --decode > "$PROFILES_HOME/littleyakka_appstore.mobileprovision"
          xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa --project "$XCODE_PROJECT" --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
