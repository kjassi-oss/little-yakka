<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="44" fill="url(#bg)"/>
  <rect width="200" height="200" rx="44" fill="url(#glow)"/>

  <!-- ── LEFT KID ── -->
  <!-- Head -->
  <circle cx="57" cy="76" r="17" fill="white"/>
  <!-- Hair bump -->
  <ellipse cx="57" cy="60" rx="10" ry="6" fill="white" opacity="0.6"/>
  <!-- Eyes -->
  <circle cx="51" cy="74" r="2.8" fill="#5B21B6"/>
  <circle cx="63" cy="74" r="2.8" fill="#5B21B6"/>
  <!-- Eye shine -->
  <circle cx="52.2" cy="72.8" r="1" fill="white"/>
  <circle cx="64.2" cy="72.8" r="1" fill="white"/>
  <!-- Smile -->
  <path d="M 51 80 Q 57 86 63 80" stroke="#5B21B6" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Rosy cheek -->
  <circle cx="47" cy="79" r="6" fill="#F9A8D4" opacity="0.35"/>
  <!-- Body -->
  <rect x="48" y="93" width="18" height="27" rx="8" fill="white"/>
  <!-- Right arm UP to high-five -->
  <line x1="66" y1="100" x2="97" y2="65" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <!-- Left arm at side -->
  <line x1="48" y1="100" x2="36" y2="115" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="53" y1="120" x2="47" y2="150" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <line x1="63" y1="120" x2="67" y2="150" stroke="white" stroke-width="7" stroke-linecap="round"/>

  <!-- ── RIGHT KID ── -->
  <!-- Head -->
  <circle cx="143" cy="76" r="17" fill="white"/>
  <!-- Pigtails / buns detail -->
  <circle cx="130" cy="63" r="7" fill="white" opacity="0.55"/>
  <circle cx="156" cy="63" r="7" fill="white" opacity="0.55"/>
  <!-- Eyes -->
  <circle cx="137" cy="74" r="2.8" fill="#5B21B6"/>
  <circle cx="149" cy="74" r="2.8" fill="#5B21B6"/>
  <!-- Eye shine -->
  <circle cx="138.2" cy="72.8" r="1" fill="white"/>
  <circle cx="150.2" cy="72.8" r="1" fill="white"/>
  <!-- Smile -->
  <path d="M 137 80 Q 143 86 149 80" stroke="#5B21B6" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Rosy cheek -->
  <circle cx="153" cy="79" r="6" fill="#F9A8D4" opacity="0.35"/>
  <!-- Body -->
  <rect x="134" y="93" width="18" height="27" rx="8" fill="white"/>
  <!-- Left arm UP to high-five -->
  <line x1="134" y1="100" x2="103" y2="65" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <!-- Right arm at side -->
  <line x1="152" y1="100" x2="164" y2="115" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="139" y1="120" x2="133" y2="150" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <line x1="149" y1="120" x2="153" y2="150" stroke="white" stroke-width="7" stroke-linecap="round"/>

  <!-- ── HIGH-FIVE STAR BURST ── -->
  <!-- Glow ring behind star -->
  <circle cx="100" cy="60" r="20" fill="#FCD34D" opacity="0.25"/>
  <!-- 5-point star -->
  <polygon points="100,43 104.1,54.3 116.2,54.8 106.7,62.2 110,73.7 100,67 90,73.7 93.3,62.2 83.8,54.8 95.9,54.3"
    fill="#FCD34D"/>
  <!-- Star inner shine -->
  <polygon points="100,49 102.2,56 108.6,56.2 103.8,60.1 105.5,66.4 100,62.8 94.5,66.4 96.2,60.1 91.4,56.2 97.8,56"
    fill="white" opacity="0.3"/>
  <!-- Sparkle lines radiating out -->
  <g stroke="#FCD34D" stroke-width="2.5" stroke-linecap="round">
    <line x1="100" y1="37" x2="100" y2="29"/>
    <line x1="118" y1="43" x2="123" y2="37"/>
    <line x1="124" y1="62" x2="132" y2="62"/>
    <line x1="82" y1="43" x2="77" y2="37"/>
    <line x1="76" y1="62" x2="68" y2="62"/>
  </g>
  <!-- Small sparkle dots -->
  <circle cx="126" cy="78" r="3.5" fill="#FCD34D" opacity="0.6"/>
  <circle cx="74" cy="78" r="3.5" fill="#FCD34D" opacity="0.6"/>
  <circle cx="116" cy="85" r="2.5" fill="white" opacity="0.4"/>
  <circle cx="84" cy="85" r="2.5" fill="white" opacity="0.4"/>
</svg>
